<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nouk Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --c1: #2563eb; --c1d: #1d4ed8; --c2: #16a34a; --c2d: #15803d;
  --danger: #dc2626; --warn: #d97706;
  --bg: #f0f2f5; --white: #fff; --border: #e5e7eb;
  --grey: #9ca3af; --dark: #111827; --muted: #6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Noto Sans Thai',-apple-system,sans-serif;font-size:15px;color:var(--dark);}

/* ===== AUTH ===== */
#authScreen{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-card{background:var(--white);border-radius:20px;padding:28px 22px;width:100%;max-width:350px;box-shadow:0 4px 30px rgba(0,0,0,.12);}
.auth-logo{font-size:40px;text-align:center;margin-bottom:10px;}
.auth-card h2{font-size:22px;text-align:center;margin-bottom:4px;}
.auth-card p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:18px;}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:all .15s;user-select:none;}
.auth-tab.active{background:var(--c1);color:#fff;}
.auth-err{font-size:13px;color:var(--danger);background:#fef2f2;border-radius:10px;padding:9px 12px;margin-bottom:12px;display:none;}
.f{margin-bottom:14px;}
.f label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px;}
.f input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;outline:none;background:#fafafa;color:var(--dark);transition:border .15s;}
.f input:focus{border-color:var(--c1);background:#fff;}
.auth-btn{width:100%;padding:13px;background:var(--c1);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s;}
.auth-btn:active{background:var(--c1d);transform:scale(.98);}

/* ===== APP ===== */
#app{display:none;height:100dvh;flex-direction:column;}
#app.show{display:flex;}

/* header */
.hdr{height:54px;background:var(--c1);color:#fff;display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.hdr-menu{background:none;border:none;color:#fff;cursor:pointer;padding:6px;border-radius:8px;display:flex;transition:background .15s;}
.hdr-menu:active{background:rgba(255,255,255,.2);}
.hdr-title{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-size:12px;opacity:.75;white-space:nowrap;}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.hdr-btn:active{background:rgba(255,255,255,.35);}

/* status */
.sbar{display:flex;align-items:center;gap:6px;padding:4px 12px;background:#fff;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);flex-shrink:0;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--c2);flex-shrink:0;}
.sdot.err{background:var(--danger);}
.msel{margin-left:auto;background:var(--bg);border:1px solid var(--border);color:var(--dark);font-size:11px;padding:3px 6px;border-radius:6px;cursor:pointer;outline:none;font-family:inherit;}

/* body */
.app-body{flex:1;display:flex;overflow:hidden;position:relative;}

/* sidebar */
.sidebar{width:260px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:30;transition:transform .25s ease;}
.sb-head{padding:14px;border-bottom:1px solid var(--border);}
.sb-head h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px;}
.new-room{display:flex;gap:6px;}
.new-room input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;min-width:0;background:#fafafa;}
.new-room input:focus{border-color:var(--c1);}
.new-room button{padding:8px 12px;background:var(--c2);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.new-room button:active{background:var(--c2d);}
.room-list{list-style:none;flex:1;overflow-y:auto;padding:8px;}
.room-item{margin-bottom:2px;}
.room-btn{width:100%;text-align:left;padding:10px 12px;border-radius:10px;background:none;border:none;cursor:pointer;font-size:14px;font-family:inherit;color:var(--dark);display:flex;align-items:center;gap:8px;transition:background .1s;}
.room-btn:active{background:var(--bg);}
.room-item.active .room-btn{background:var(--c1);color:#fff;font-weight:600;}
.room-item.dm-item .room-btn{color:var(--c2d);}
.room-item.dm-item.active .room-btn{background:var(--c2);color:#fff;}
.room-label{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);padding:10px 12px 4px;letter-spacing:.05em;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--c2);flex-shrink:0;}

.sb-user{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.u-av{width:36px;height:36px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;}
.u-av.admin{background:var(--danger);}
.u-info{flex:1;min-width:0;}
.u-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:11px;color:var(--muted);}

/* overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25;}
.sb-overlay.show{display:block;}

/* mobile */
@media(max-width:599px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
}
@media(min-width:600px){
  .hdr-menu{display:none;}
  .sidebar{transform:none!important;position:static;}
}

/* chat */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;}

.msg-row{display:flex;flex-direction:column;max-width:80%;}
.msg-row.me{align-self:flex-end;align-items:flex-end;}
.msg-row.bot,.msg-row.other{align-self:flex-start;align-items:flex-start;}
.msg-row.sys{align-self:center;max-width:90%;}
.msg-sender{font-size:11px;font-weight:700;margin-bottom:3px;padding:0 4px;}
.msg-row.bot .msg-sender{color:var(--c1);}
.msg-row.me .msg-sender{color:var(--c2d);}
.msg-row.other .msg-sender{color:var(--warn);}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.msg-row.bot .msg-bubble{background:#fff;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid var(--c1);}
.msg-row.me .msg-bubble{background:var(--c1);color:#fff;border-bottom-right-radius:4px;}
.msg-row.other .msg-bubble{background:#fff;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid var(--warn);}
.msg-row.sys .msg-bubble{background:rgba(0,0,0,.05);color:var(--muted);font-size:12px;padding:5px 14px;border-radius:12px;text-align:center;}
.msg-time{font-size:11px;color:var(--grey);margin-top:3px;padding:0 4px;}

/* typing */
.typing-row{align-self:flex-start;display:flex;flex-direction:column;}
.typing-bubble{background:#fff;padding:12px 16px;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid var(--c1);}
.dots{display:flex;gap:5px;align-items:center;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bonce 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bonce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}

/* input */
.input-wrap{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom,8px));background:#fff;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.msg-inp{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:10px 16px;font-size:16px;font-family:inherit;resize:none;outline:none;max-height:120px;overflow-y:auto;background:#fafafa;line-height:1.4;transition:border .15s;color:var(--dark);}
.msg-inp:focus{border-color:var(--c1);background:#fff;}
.msg-inp::placeholder{color:#bbb;}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--c1);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.send-btn:active{background:var(--c1d);transform:scale(.9);}
.send-btn:disabled{background:#ccc;cursor:default;transform:none;}

/* admin modal */
#adminModal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:16px;}
#adminModal.show{display:flex;}
.admin-card{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:80dvh;display:flex;flex-direction:column;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h3{font-size:18px;}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
.user-list{overflow-y:auto;flex:1;}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;}
.user-row:last-child{border:none;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-warn{background:#fef3c7;color:#92400e;}
.btn-danger{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">💬</div>
    <h2>Nouk Chat</h2>
    <p>เข้าสู่ระบบเพื่อเริ่มแชท</p>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</div>
      <div class="auth-tab" onclick="switchTab('register')">สมัครสมาชิก</div>
    </div>
    <div class="auth-err" id="authErr"></div>
    <div class="f"><label>ชื่อผู้ใช้</label><input type="text" id="authUser" placeholder="username" autocomplete="username" autocapitalize="none" inputmode="text"></div>
    <div class="f"><label>รหัสผ่าน</label><input type="password" id="authPass" placeholder="รหัสผ่าน" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"></div>
    <button class="auth-btn" onclick="doAuth()" id="authBtn">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal">
  <div class="admin-card">
    <div class="modal-head"><h3>⚙️ Admin Panel</h3><button class="close-btn" onclick="closeAdmin()">✕</button></div>
    <div class="user-list" id="userList"></div>
  </div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <button class="hdr-menu" onclick="toggleSb()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div style="flex:1;min-width:0;">
      <div class="hdr-title" id="hdrTitle"># general</div>
      <div class="hdr-sub" id="hdrSub"></div>
    </div>
    <button class="hdr-btn" id="adminBtn" onclick="openAdmin()" style="display:none">⚙️</button>
    <button class="hdr-btn" onclick="doLogout()">ออก</button>
  </div>

  <div class="sbar">
    <div class="sdot" id="sdot"></div>
    <span id="stext">กำลังเชื่อมต่อ...</span>
    <select class="msel" id="modelSel">
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
      <option value="llama-3.1-8b-instant">Llama 3.1 8B ⚡</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      <option value="gemma2-9b-it">Gemma 2 9B</option>
    </select>
  </div>

  <div class="app-body">
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <h3>ห้องแชท</h3>
        <form class="new-room" onsubmit="createRoom(event)">
          <input type="text" id="newRoom" placeholder="ห้องใหม่" autocapitalize="none">
          <button type="submit">+</button>
        </form>
      </div>

      <ul class="room-list" id="roomList"></ul>

      <div class="sb-user">
        <div class="u-av" id="uAv">U</div>
        <div class="u-info">
          <div class="u-name" id="uName">User</div>
          <div class="u-role" id="uRole">Member</div>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages"></div>
      <div class="input-wrap">
        <textarea class="msg-inp" id="msgInp" placeholder="พิมพ์ข้อความ..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"
          readonly></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let me = null;
let authMode = 'login';
let currentRoom = 'general';
let currentDM = null; // username ถ้าเป็น DM
let rooms = JSON.parse(localStorage.getItem('chatRooms') || '["general","random"]');
let histories = {}; // room => [{role,content}]
let dmUsers = []; // list of users for DM
let isTyping = false;
let botName = 'Nouk_Bot';

// ===== AUTH =====
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('authBtn').textContent = mode==='login'?'เข้าสู่ระบบ':'สมัครสมาชิก';
  document.getElementById('authErr').style.display='none';
}

async function doAuth() {
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value.trim();
  showAuthErr('');
  if (!username||!password){showAuthErr('กรุณากรอกข้อมูล');return;}
  try {
    const res = await fetch(`${API}/${authMode}`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data = await res.json();
    if (data.ok){me=data;initApp();}
    else showAuthErr(data.error||'เกิดข้อผิดพลาด');
  } catch {showAuthErr('เชื่อมต่อ server ไม่ได้');}
}

function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  if(msg){el.textContent=msg;el.style.display='block';}else el.style.display='none';
}

async function doLogout() {
  await fetch(`${API}/logout`,{method:'POST',credentials:'include'});
  me=null;histories={};currentDM=null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('messages').innerHTML='';
}

// ===== INIT =====
async function initApp() {
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('uName').textContent = me.username;
  document.getElementById('uAv').textContent = me.username[0].toUpperCase();
  if(me.is_admin){
    document.getElementById('uRole').textContent='👑 Admin';
    document.getElementById('uAv').classList.add('admin');
    document.getElementById('adminBtn').style.display='';
  }
  // enable input
  document.getElementById('msgInp').removeAttribute('readonly');
  await loadUsers();
  renderSidebar();
  selectRoom('general');
  checkStatus();

  // keyboard fix for mobile — show only on focus
  const inp = document.getElementById('msgInp');
  inp.addEventListener('focus', () => { setTimeout(scrollBottom, 300); });
}

async function loadUsers() {
  try {
    const res = await fetch(`${API}/users`,{credentials:'include'});
    const data = await res.json();
    dmUsers = data.users || [];
  } catch {}
}

// ===== SIDEBAR =====
function renderSidebar() {
  const ul = document.getElementById('roomList');
  ul.innerHTML = '';

  // Room section
  const roomLabel = document.createElement('li');
  roomLabel.innerHTML = '<div class="room-label">📢 Rooms</div>';
  ul.appendChild(roomLabel);

  rooms.forEach(r => {
    const li = document.createElement('li');
    li.className = 'room-item' + (currentRoom===r && !currentDM ? ' active' : '');
    li.dataset.room = r;
    const btn = document.createElement('button');
    btn.className = 'room-btn';
    btn.innerHTML = `<span>#</span>${r}`;
    btn.addEventListener('click', () => selectRoom(r));
    li.appendChild(btn);
    ul.appendChild(li);
  });

  // DM section
  if (dmUsers.length > 0) {
    const dmLabel = document.createElement('li');
    dmLabel.innerHTML = '<div class="room-label">💬 Direct Messages</div>';
    ul.appendChild(dmLabel);

    dmUsers.forEach(u => {
      const li = document.createElement('li');
      li.className = 'room-item dm-item' + (currentDM===u.username ? ' active' : '');
      const btn = document.createElement('button');
      btn.className = 'room-btn';
      btn.innerHTML = `<span class="online-dot"></span>${u.username}${u.is_admin?' 👑':''}`;
      btn.addEventListener('click', () => selectDM(u.username));
      li.appendChild(btn);
      ul.appendChild(li);
    });
  }
}

function selectRoom(room) {
  currentRoom = room;
  currentDM = null;
  closeSb();
  document.getElementById('hdrTitle').textContent = `# ${room}`;
  document.getElementById('hdrSub').textContent = 'ห้องแชทกลุ่ม';
  renderSidebar();
  renderMessages();
  document.getElementById('msgInp').placeholder = `พิมพ์ข้อความใน #${room}...`;
}

async function selectDM(username) {
  currentDM = username;
  currentRoom = null;
  closeSb();
  document.getElementById('hdrTitle').textContent = `@ ${username}`;
  document.getElementById('hdrSub').textContent = 'Direct Message';
  renderSidebar();
  await loadDMHistory(username);
  document.getElementById('msgInp').placeholder = `ส่งข้อความหา ${username}...`;
}

function createRoom(e) {
  e.preventDefault();
  const inp = document.getElementById('newRoom');
  const name = inp.value.trim().replace(/\s+/g,'-').toLowerCase();
  if(!name||rooms.includes(name)){inp.value='';return;}
  rooms.push(name);
  localStorage.setItem('chatRooms',JSON.stringify(rooms));
  inp.value='';
  renderSidebar();
  selectRoom(name);
}

// sidebar toggle
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOverlay').classList.toggle('show');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOverlay').classList.remove('show');}

// ===== MESSAGES =====
function renderMessages() {
  const el = document.getElementById('messages');
  el.innerHTML='';
  const key = currentDM ? `dm_${currentDM}` : currentRoom;
  (histories[key]||[]).forEach(m=>addBubble(m.role,m.content,m.sender,false));
  scrollBottom();
}

async function loadDMHistory(username) {
  const key = `dm_${username}`;
  try {
    const res = await fetch(`${API}/dm/history/${username}`,{credentials:'include'});
    const data = await res.json();
    histories[key] = (data.messages||[]).map(m=>({
      role: m.sender===me.username?'me':'other',
      content: m.message,
      sender: m.sender
    }));
    renderMessages();
  } catch {renderMessages();}
}

function scrollBottom(){const el=document.getElementById('messages');el.scrollTop=el.scrollHeight;}
function getTime(){return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}
function escH(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function addBubble(role, text, sender, scroll=true) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');

  if(role==='typing'){
    div.className='msg-row typing-row';
    div.id='typingBubble';
    div.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--c1);margin-bottom:3px;padding:0 4px">${botName}</div><div class="typing-bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  } else if(role==='user'||role==='me'){
    div.className='msg-row me';
    div.innerHTML=`<div class="msg-sender">${me.username}</div><div class="msg-bubble">${escH(text)}</div><div class="msg-time">${getTime()}</div>`;
  } else if(role==='assistant'){
    div.className='msg-row bot';
    div.innerHTML=`<div class="msg-sender">${botName}</div><div class="msg-bubble">${escH(text)}</div><div class="msg-time">${getTime()}</div>`;
  } else if(role==='other'){
    div.className='msg-row other';
    div.innerHTML=`<div class="msg-sender">${sender||'?'}</div><div class="msg-bubble">${escH(text)}</div><div class="msg-time">${getTime()}</div>`;
  } else {
    div.className='msg-row sys';
    div.innerHTML=`<div class="msg-bubble">${escH(text)}</div>`;
  }

  el.appendChild(div);
  if(scroll) scrollBottom();
}

// ===== SEND =====
async function sendMsg() {
  const inp = document.getElementById('msgInp');
  const text = inp.value.trim();
  if(!text||isTyping) return;
  inp.value=''; autoResize(inp);
  document.getElementById('sendBtn').disabled=true;

  if(currentDM) {
    // DM mode
    const key=`dm_${currentDM}`;
    if(!histories[key]) histories[key]=[];
    histories[key].push({role:'me',content:text,sender:me.username});
    addBubble('me', text, me.username);
    try {
      const res = await fetch(`${API}/dm/send`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({receiver:currentDM,message:text})});
      const data = await res.json();
      if(!data.ok) addBubble('sys','ส่งไม่ได้: '+(data.error||'error'));
    } catch { addBubble('sys','เชื่อมต่อไม่ได้'); }
  } else {
    // AI chat mode
    const key = currentRoom;
    if(!histories[key]) histories[key]=[];
    histories[key].push({role:'user',content:text});
    addBubble('user',text,me.username);
    isTyping=true;
    addBubble('typing','');
    try {
      const model = document.getElementById('modelSel').value;
      const res = await fetch(`${API}/chat`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:histories[key].slice(-14),model,room:currentRoom})});
      const data = await res.json();
      document.getElementById('typingBubble')?.remove();
      if(data.reply){
        histories[key].push({role:'assistant',content:data.reply});
        addBubble('assistant',data.reply);
        if(data.key_used) document.getElementById('stext').textContent=`เชื่อมต่อแล้ว • Key ${data.key_used}/${data.total_keys}`;
      } else if(data.error==='กรุณา login ก่อน'){
        doLogout();
      } else {
        addBubble('assistant','⚠️ '+(data.error||'เกิดข้อผิดพลาด'));
      }
    } catch {
      document.getElementById('typingBubble')?.remove();
      addBubble('assistant','⚠️ เชื่อมต่อ server ไม่ได้');
    }
    isTyping=false;
  }

  document.getElementById('sendBtn').disabled=false;
}

function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ===== STATUS =====
async function checkStatus() {
  try {
    const res = await fetch(`${API}/status`,{credentials:'include'});
    const data = await res.json();
    if(data.ok){
      document.getElementById('sdot').className='sdot';
      document.getElementById('stext').textContent=`เชื่อมต่อแล้ว • Key ${data.current_key}/${data.total_keys}`;
      if(data.bot_name) botName=data.bot_name;
    } else {
      document.getElementById('sdot').className='sdot err';
      document.getElementById('stext').textContent='เชื่อมต่อไม่ได้';
    }
  } catch {
    document.getElementById('sdot').className='sdot err';
    document.getElementById('stext').textContent='Server ออฟไลน์';
  }
}

// ===== ADMIN =====
async function openAdmin() {
  document.getElementById('adminModal').classList.add('show');
  try {
    const res = await fetch(`${API}/admin/users`,{credentials:'include'});
    const data = await res.json();
    const ul = document.getElementById('userList');
    ul.innerHTML='';
    (data.users||[]).forEach(u=>{
      const div=document.createElement('div');
      div.className='user-row';
      div.innerHTML=`<div><strong>${u.username}</strong>${u.is_admin?' 👑':''}</div><div style="display:flex;gap:6px"><button class="btn-sm btn-warn" onclick="clearMem('${u.username}')">ล้าง Memory</button>${!u.is_admin?`<button class="btn-sm btn-danger" onclick="delUser('${u.username}')">ลบ</button>`:''}</div>`;
      ul.appendChild(div);
    });
  } catch {document.getElementById('userList').textContent='โหลดไม่ได้';}
}
function closeAdmin(){document.getElementById('adminModal').classList.remove('show');}
async function clearMem(username){
  if(!confirm(`ล้าง memory ของ ${username}?`))return;
  const res=await fetch(`${API}/admin/clear_memory`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  if((await res.json()).ok)alert('ล้างแล้ว ✅');
}
async function delUser(username){
  if(!confirm(`ลบบัญชี ${username}?`))return;
  await fetch(`${API}/admin/delete_user`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  openAdmin();await loadUsers();renderSidebar();
}

// ===== INIT CHECK SESSION =====
(async()=>{
  try{
    const res=await fetch(`${API}/me`,{credentials:'include'});
    const data=await res.json();
    if(data.logged_in){me=data;initApp();}
  }catch{}
})();

setInterval(checkStatus,30000);
// poll DM ทุก 5 วินาที
setInterval(async()=>{
  if(currentDM){await loadDMHistory(currentDM);}
},5000);
</script>
